<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="6" fill="#1a3a5c"/>

  <!-- Baseline -->
  <line x1="3" y1="28" x2="29" y2="28" stroke="#3a6a9c" stroke-width="1"/>

  <!-- Ascending bars -->
  <rect x="4"  y="20" width="6" height="8" rx="1" fill="#5b9bd5"/>
  <rect x="13" y="13" width="6" height="15" rx="1" fill="#5b9bd5"/>
  <rect x="22" y="7"  width="6" height="21" rx="1" fill="#5b9bd5"/>

  <!-- Trend line -->
  <polyline points="7,20 16,13 25,7"
    fill="none" stroke="#f0a500" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Trend line dots -->
  <circle cx="7"  cy="20" r="2" fill="#f0a500"/>
  <circle cx="16" cy="13" r="2" fill="#f0a500"/>
  <circle cx="25" cy="7"  r="2" fill="#f0a500"/>
</svg>
